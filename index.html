<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Martín Urquiza | Links</title>
  <meta name="description" content="Tragos · Cocina · Gastronomía · Buenos Aires">
  <meta property="og:title" content="Martín Urquiza | Links">
  <meta property="og:description" content="Tragos, cocina y gastronomía • +97K seguidores en Instagram">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080808;
      --card-bg:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.10);
      --text:       #f0ece4;
      --muted:      rgba(240,236,228,0.50);
      --amber:      #c9812a;
      --amber-lt:   #e8a84a;
      --amber-glow: rgba(201,129,42,0.15);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
      font-family: 'Jost', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--amber-glow) 0%, transparent 65%);
      top: -300px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50%       { opacity: 0.7; transform: translateX(-50%) scale(1.1); }
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 38px 28px 30px;
      text-align: center;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.65),
        0 0 0 0.5px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.08) inset;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      width: 104px;
      height: 104px;
      margin: 0 auto 20px;
    }
    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        var(--amber) 0deg,
        var(--amber-lt) 90deg,
        #f0c060 180deg,
        var(--amber-lt) 270deg,
        var(--amber) 360deg
      );
      animation: spin 10s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }
    .avatar {
      position: absolute;
      inset: 3px;
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      border-radius: 50%;
      object-fit: cover;
      z-index: 1;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .handle {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--amber-lt);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .bio {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 26px;
    }
    .bio strong { color: rgba(240,236,228,0.85); font-weight: 500; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
      margin: 0 0 22px;
    }

    .links { display: flex; flex-direction: column; gap: 11px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      text-decoration: none;
      color: #fff;
      padding: 15px 20px;
      border-radius: 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      transition:
        transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
        box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .btn:nth-child(1) { animation-delay: 0.08s; }
    .btn:nth-child(2) { animation-delay: 0.14s; }
    .btn:nth-child(3) { animation-delay: 0.20s; }
    .btn:nth-child(4) { animation-delay: 0.26s; }

    /* Shimmer on hover */
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transition: left 0.4s ease;
    }
    .btn:hover::after { left: 160%; }
    .btn:hover { transform: scale(1.025) translateY(-2px); }
    .btn:active { transform: scale(0.975); }

    .btn-instagram {
      background: linear-gradient(135deg, #f58529 0%, #dd2a7b 50%, #515bd4 100%);
      box-shadow: 0 4px 20px rgba(221,42,123,0.25);
    }
    .btn-instagram:hover { box-shadow: 0 8px 28px rgba(221,42,123,0.40); }

    .btn-tiktok {
      background: #0e0e0e;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-tiktok:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.5); }

    .btn-merch {
      background: linear-gradient(135deg, #181818, #282828);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-mediakit {
      background: linear-gradient(135deg, var(--amber) 0%, var(--amber-lt) 100%);
      color: #1a0d00;
      box-shadow: 0 4px 20px rgba(201,129,42,0.30);
    }
    .btn-mediakit:hover { box-shadow: 0 8px 28px rgba(201,129,42,0.45); }
    .btn-mediakit svg { color: #1a0d00; }

    .btn svg { width: 17px; height: 17px; flex-shrink: 0; }

    /* Followers badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(201,129,42,0.12);
      border: 1px solid rgba(201,129,42,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--amber-lt);
      margin-bottom: 18px;
    }
    .badge::before { content: '▲'; font-size: 0.6rem; }

    footer {
      margin-top: 26px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
